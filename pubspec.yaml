name: erzurum_kampus
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase - Birbiriyle Uyumlu En Güncel Sürümler
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.10  # Çakışmayı çözen anahtar sürüm burası
  
  # Araçlar
  google_sign_in: ^7.0.0
  shared_preferences: ^2.5.2
  
  # Medya ve İzinler
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  video_player: ^2.9.2
  chewie: ^1.8.5
  intl: ^0.19.0
  
  # Ekstra Paketler
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.5
  google_mlkit_text_recognition: ^0.15.1
  uuid: ^4.5.1
  http: ^1.6.0
  firebase_remote_config: ^5.5.0
  onesignal_flutter: ^5.5.1
  share_plus: ^13.1.0
  app_links: ^7.0.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true